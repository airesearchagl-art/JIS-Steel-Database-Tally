<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>鉄骨数量集計システム</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #e67e22; --success: #27ae60; --info: #2980b9; --purple: #8e44ad; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #f4f7f9; margin: 15px; font-size: 11px; color: #333; }
        .container { max-width: 1600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4em; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .toolbar { margin-bottom: 20px; display: flex; gap: 8px; background: #f0f2f5; padding: 12px; border-radius: 6px; align-items: center; border: 1px solid #ddd; }
        .group-container { border: 1px solid #ccc; border-radius: 6px; margin-bottom: 25px; background: #fff; overflow-x: auto; }
        .group-header { background: #e9ecef; padding: 8px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; table-layout: fixed; }
        th { background: var(--secondary); color: white; padding: 6px 2px; font-weight: normal; cursor: pointer; border: 1px solid #455a64; text-align: center; }
        td { border: 1px solid #ddd; padding: 2px; }
        
        .col-usage { width: 150px; }
        .col-cat   { width: 110px; }
        .col-size  { width: 230px; }
        .col-spec  { width: 65px; }
        .col-num   { width: 60px; }
        .col-result{ width: 85px; }
        .col-op    { width: 110px; }

        select, input { width: 100%; padding: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; height: 26px; }
        .num { text-align: right; }
        .total-panel { background: var(--primary); color: white; padding: 15px 25px; border-radius: 6px; text-align: right; margin-top: 10px; }
        .btn { border: none; border-radius: 4px; cursor: pointer; color: white; padding: 6px 12px; font-weight: bold; font-size: 11px; }
        .btn-copy { background: #f39c12; }
        .btn-move { background: #7f8c8d; }
        .btn-del { background: #e74c3c; }
        .hidden-file { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>鉄骨数量集計システム
        <div>
            <button class="btn" style="background:var(--purple)" onclick="exportProject()">プロジェクト保存</button>
            <label class="btn" style="background:var(--accent); display:inline-block;">読込<input type="file" class="hidden-file" onchange="importProject(this)"></label>
            <button class="btn" style="background:var(--info)" onclick="exportCSV()">CSV出力</button>
        </div>
    </h1>
    
    <div class="toolbar">
        <strong>操作メニュー:</strong>
        <button class="btn" style="background:var(--success)" onclick="addGroup()">+ 新規グループ追加</button>
        <span style="color:#666; margin-left:10px;">JIS規格（重量・軽量・FB・PL）の全バリエーションを網羅した統合データベースです。</span>
    </div>

    <div id="groupsArea"></div>

    <div class="total-panel">
        <div>総合計重量: <span id="grandWeight" style="font-size: 1.8em; color: #f1c40f;">0.00</span> kg / <span id="grandTon">0.000</span> t</div>
        <div>総合計表面積: <span id="grandArea" style="font-size: 1.4em; color: #3498db;">0.00</span> ㎡</div>
    </div>
</div>

let gCounter = 0;

function addGroup(name = "") {
    gCounter++;
    const area = document.getElementById('groupsArea');
    const div = document.createElement('div');
    div.className = 'group-container';
    div.id = `g-${gCounter}`;
    div.innerHTML = `
        <div class="group-header">
            <input type="text" class="group-name-input" value="${name || '新規グループ ' + gCounter}">
            <button class="btn btn-del" onclick="removeGroup(${gCounter})">削除</button>
            <span style="margin-left:auto; font-weight:bold;">グループ計: <span class="g-w">0</span> kg / <span class="g-a">0</span> ㎡</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="col-usage" onclick="sort(this,0)">使用箇所</th>
                    <th class="col-cat">大分類</th><th class="col-cat">中分類</th><th class="col-cat">小分類</th>
                    <th class="col-size">サイズ選択</th>
                    <th class="col-spec" onclick="sort(this,5)">kg/m</th><th class="col-spec">㎡/m</th>
                    <th class="col-num">長さ(m)</th><th class="col-num">本数</th>
                    <th class="col-result" onclick="sort(this,9)">重量(kg)</th><th class="col-result">面積(㎡)</th>
                    <th class="col-op">操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div style="padding:8px; border-top:1px solid #ddd; text-align:right;">
            <button class="btn" style="background:var(--success)" onclick="addRow(${gCounter})">+ 行追加</button>
        </div>
    `;
    area.appendChild(div);
    if(!name) addRow(gCounter);
}

function addRow(gId, d = null) {
    const tbody = document.querySelector(`#g-${gId} tbody`);
    const tr = document.createElement('tr');
    let opt = '<option value="">選択</option>';
    for (let k in steelDB) opt += `<option value="${k}">${k}</option>`;

    tr.innerHTML = `
        <td><input type="text" class="usage" value="${d?d.usage:''}"></td>
        <td><select onchange="upL2(this)">${opt}</select></td>
        <td><select onchange="upL3(this)"><option>-</option></select></td>
        <td><select onchange="upSz(this)"><option>-</option></select></td>
        <td><select onchange="setSt(this)"><option>-</option></select></td>
        <td><input type="number" class="u num" step="0.01" oninput="calc(this)" value="${d?d.u:''}"></td>
        <td><input type="text" class="a num" oninput="calc(this)" value="${d?d.a:''}"></td>
        <td><input type="number" class="l num" step="0.001" oninput="calc(this)" value="${d?d.l:0}"></td>
        <td><input type="number" class="q num" oninput="calc(this)" value="${d?d.q:0}"></td>
        <td class="num res-w">0.00</td>
        <td class="num res-a">0.00</td>
        <td class="col-op">
            <button class="btn btn-copy" onclick="copyRow(this)">複</button>
            <button class="btn btn-move" onclick="move(this,-1)">▲</button>
            <button class="btn btn-move" onclick="move(this,1)">▼</button>
            <button class="btn btn-del" onclick="this.closest('tr').remove(); total();">×</button>
        </td>
    `;
    tbody.appendChild(tr);
    if(d) calc(tr.querySelector('input'));
}

function upL2(e){ const l2=e.closest('tr').querySelectorAll('select')[1]; l2.innerHTML='<option>-</option>'; if(e.value) for(let k in steelDB[e.value]) l2.innerHTML+=`<option value="${k}">${k}</option>`; }
function upL3(e){ const tr=e.closest('tr'), l1=tr.querySelectorAll('select')[0].value, l2=tr.querySelectorAll('select')[1].value, l3=tr.querySelectorAll('select')[2]; l3.innerHTML='<option>-</option>'; if(l1 && l2) for(let k in steelDB[l1][l2]) l3.innerHTML+=`<option value="${k}">${k}</option>`; }
function upSz(e){ const tr=e.closest('tr'), l1=tr.querySelectorAll('select')[0].value, l2=tr.querySelectorAll('select')[1].value, l3=tr.querySelectorAll('select')[2].value, sz=tr.querySelectorAll('select')[3]; sz.innerHTML='<option>-</option>'; if(l1 && l2 && l3) steelDB[l1][l2][l3].forEach(i=>{ let o=document.createElement('option'); o.value=JSON.stringify(i); o.textContent=i.n; sz.appendChild(o); }); }
function setSt(e){ if(!e.value || e.value==="-") return; const d=JSON.parse(e.value), tr=e.closest('tr'); tr.querySelector('.u').value=d.u; tr.querySelector('.a').value=d.a||"-"; calc(e); }

function calc(e){
    const tr=e.closest('tr'), u=parseFloat(tr.querySelector('.u').value)||0, at=tr.querySelector('.a').value, a=at==="-"?0:(parseFloat(at)||0), l=parseFloat(tr.querySelector('.l').value)||0, q=parseFloat(tr.querySelector('.q').value)||0;
    tr.querySelector('.res-w').textContent=(u*l*q).toFixed(2); tr.querySelector('.res-a').textContent=at==="-"?"-":(a*l*q).toFixed(2);
    total();
}

function total(){
    let gw=0, ga=0;
    document.querySelectorAll('.group-container').forEach(g=>{
        let w=0, a=0;
        g.querySelectorAll('.res-w').forEach(s=> w+=parseFloat(s.textContent)||0);
        g.querySelectorAll('.res-a').forEach(s=>{ const v=parseFloat(s.textContent); if(!isNaN(v)) a+=v; });
        g.querySelector('.g-w').textContent=w.toLocaleString(); g.querySelector('.g-a').textContent=a.toFixed(2);
        gw+=w; ga+=a;
    });
    document.getElementById('grandWeight').textContent=gw.toLocaleString();
    document.getElementById('grandTon').textContent=(gw/1000).toFixed(3);
    document.getElementById('grandArea').textContent=ga.toFixed(2);
}

function copyRow(btn){ const tr=btn.closest('tr'), gId=tr.closest('.group-container').id.split('-')[1]; addRow(gId,{usage:tr.querySelector('.usage').value, u:tr.querySelector('.u').value, a:tr.querySelector('.a').value, l:tr.querySelector('.l').value, q:tr.querySelector('.q').value}); }
function move(btn,dir){ const tr=btn.closest('tr'); if(dir===-1 && tr.previousElementSibling) tr.parentNode.insertBefore(tr, tr.previousElementSibling); if(dir===1 && tr.nextElementSibling) tr.parentNode.insertBefore(tr.nextElementSibling, tr); }
function sort(th,idx){ const tb=th.closest('table').querySelector('tbody'), rs=Array.from(tb.rows), asc=th.dataset.ord!=='asc'; rs.sort((a,b)=>{ let vA=a.cells[idx].querySelector('input')?.value||a.cells[idx].textContent, vB=b.cells[idx].querySelector('input')?.value||b.cells[idx].textContent; return asc?(isNaN(vA-vB)?vA.localeCompare(vB):vA-vB):(isNaN(vA-vB)?vB.localeCompare(vA):vB-vA); }); th.dataset.ord=asc?'asc':'desc'; rs.forEach(r=>tb.appendChild(r)); }

function exportProject(){
    const d=[]; document.querySelectorAll('.group-container').forEach(g=>{ const rows=[]; g.querySelectorAll('tbody tr').forEach(tr=>{ rows.push({usage:tr.querySelector('.usage').value, u:tr.querySelector('.u').value, a:tr.querySelector('.a').value, l:tr.querySelector('.l').value, q:tr.querySelector('.q').value}); }); d.push({name:g.querySelector('.group-name-input').value, rows}); });
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}), l=document.createElement("a"); l.href=URL.createObjectURL(b); l.download=`steel_project.json`; l.click();
}
function importProject(i){
    const f=i.files[0]; if(!f) return; const r=new FileReader(); r.onload=(e)=>{ const data=JSON.parse(e.target.result); document.getElementById('groupsArea').innerHTML=''; gCounter=0; data.forEach(g=>{ addGroup(g.name); g.rows.forEach(row=>addRow(gCounter,row)); }); total(); }; r.readAsText(f);
}
function exportCSV(){
    let c="\uFEFFグループ,使用箇所,単位重量,単位面積,長さ,本数,重量,面積\n"; document.querySelectorAll('.group-container').forEach(g=>{ const n=g.querySelector('.group-name-input').value; g.querySelectorAll('tbody tr').forEach(tr=>{ c+=`"${n}","${tr.querySelector('.usage').value}",${tr.querySelector('.u').value},${tr.querySelector('.a').value},${tr.querySelector('.l').value},${tr.querySelector('.q').value},${tr.querySelector('.res-w').textContent},${tr.querySelector('.res-a').textContent}\n`; }); });
    const b=new Blob([c],{type:'text/csv'}), l=document.createElement("a"); l.href=URL.createObjectURL(b); l.download="steel_list.csv"; l.click();
}
function removeGroup(id){ if(confirm('グループを削除しますか？')) document.getElementById(`g-${id}`).remove(); total(); }

addGroup();
</script>
</body>
